app = "hellobrand-dev-worker"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile.inngest-worker"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[vm]
  memory = "512mb"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "20s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/ready"
