app = "hellobrand-dev-documenso"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  image = "documenso/documenso:latest"

[env]
  PORT = "3000"
  HOSTNAME = "0.0.0.0"
  NEXT_PRIVATE_SMTP_TRANSPORT = "resend"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

[vm]
  size = "shared-cpu-1x"
  memory = "1gb"

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[http_service.checks]]
  grace_period = "120s"
  interval = "15s"
  method = "GET"
  timeout = "10s"
  path = "/api/health"
