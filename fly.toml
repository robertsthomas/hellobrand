app = "hellobrand-inngest-worker"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile.inngest-worker"

[env]
  PORT = "8080"

[checks]
  [checks.ready]
    type = "http"
    port = 8080
    method = "get"
    path = "/ready"
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
