app = "hellobrand-dev"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile.app"
  [build.args]
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY = "pk_test_Y29tcG9zZWQtd2FzcC04Ni5jbGVyay5hY2NvdW50cy5kZXYk"

[env]
  PORT = "8080"
  HOSTNAME = "::"
  NODE_ENV = "production"
  INNGEST_SERVE_DISABLED = "1"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[vm]
  memory = "512mb"

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"
